<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="all.css">
    <link rel="stylesheet" href="jquery-ui.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <link rel="stylesheet" href="MainStyles.css">
    <style>
      .card{
        border-radius: 10px;
        cursor: pointer;
        
      }
      img{
          border-radius: 10px;
        }

      
    </style>
    <link rel="shortcut icon" href="pictures/logo.png" type="image/x-icon">
    <title>FarmLink - Sing In</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
          <a class="navbar-brand" href="index.html"><img src="pictures/logo.png" alt="" style="height: 60px; width: 60px;">FarmLink</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText" aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarText">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link" href="home_cliente.html">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="marketplace.html">MarketPlace</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="html/subscription.html">Assinaturas</a>
              </li>
            </ul>   
          </div>
        </div>
      </nav>

      <br><br>
      <div class="row">
          <div class="col-4" style="padding-left: 50px;"><input class="form-control" type="search" placeholder="Alface, morango, tomate, milho?" aria-label="Search" data-bind="value:pesquisado"></div>
          <div class="col-3 dropdown">
            <button class="btn btn-success dropdown-toggle" type="button" id="dropdownMenuButton1" data-bs-toggle="dropdown" aria-expanded="false">
              Filtre por distância ao produtor
            </button>
            <ul class="dropdown-menu" aria-labelledby="dropdownMenuButton1">
              <li style="cursor: pointer; padding-left: 14px;" data-bind="click:zero">00 - 10km </li>
              <li style="cursor: pointer; padding-left: 14px;padding-right: 5px;" data-bind="click:dez"> 10 - 20km</li>
              <li style="cursor: pointer; padding-left: 14px;" data-bind="click:vinte"> 20 - 30km </li>
              <li style="cursor: pointer; padding-left: 14px;" data-bind="click:trinta"> 30 - 40km </li>
            </ul>
          </div>
          <div class="col-3 dropdown">
            <button class="btn btn-success dropdown-toggle" type="button" id="dropdownMenuButton2" data-bs-toggle="dropdown" aria-expanded="false">
              Filtre por avaliação do produtor
            </button>
            <ul class="dropdown-menu" aria-labelledby="dropdownMenuButton1">
              <li style="cursor: pointer; padding-left: 14px;" data-bind="click:noventa">100 - 90% </li>
              <li style="cursor: pointer; padding-left: 14px;padding-right: 5px;" data-bind="click:oitenta"> 90 - 80% </li>
              <li style="cursor: pointer; padding-left: 14px;" data-bind="click:setenta"> 80 - 70% </li>
            </ul>
          </div>
      </div>
        <br><br><br>

      

    <div class="d-flex justify-content-center">
      <div class="row g-12" data-bind="foreach:produtos"> 
          <!-- ko if: $parent.pesquisado()!=""-->
          <!-- ko if: produto.toLowerCase().includes($parent.pesquisado())  -->
          <div class="col-4 prodcol">
              <div class="card prodcard hvr-grow" style="width:400px">
                <a data-bind="click: PageTrasition">
                  <img class="card-img-top" data-bind="attr: {src : ImagemSrc}" alt="Card image" style="width:100%">
                </a>
                <div class="card-body">
                  <h4 class="card-title" data-bind="text:produto"></h4>
                  <p class="card-text" data-bind="text:GetProdutorNome(productorID)"></p>
                  <br>
                  <i class="fas fa-map-marker-alt"></i>
                  <p class="card-text" data-bind="text:GetProdutorlocalizacao(productorID)">
                     <p class="card-text dist" data-bind="text:distancia"></p>
                     <i class="fas fa-thumbs-up"></i>
                     <p class="card-text avaliacao" data-bind="text:GetProdutorRating(productorID)">
                  </p>
                </div>
              </div>
            </div>
          <!-- /ko -->
          <!-- /ko -->
          <!-- ko if:$parent.pesquisado()=="" -->
                <div class="col-lg-4 prodcol">
                  <div class="card prodcard hvr-grow" style="width:400px">
                    <a data-bind="click: PageTrasition">
                      <img class="card-img-top" data-bind="attr: {src : ImagemSrc}" alt="Card image" style="width:100%">
                    </a>
                    <div class="card-body">
                      <h4 class="card-title" data-bind="text:produto"></h4>
                      <p class="card-text" data-bind="text:GetProdutorNome(productorID)"></p>
                      <br>
                      <i class="fas fa-map-marker-alt"></i>
                      <p class="card-text" data-bind="text:GetProdutorlocalizacao(productorID)">
                        <p class="card-text dist" data-bind="text:distancia"></p>
                        <i class="fas fa-thumbs-up"></i>
                        <p class="card-text avaliacao" data-bind="text:GetProdutorRating(productorID)"></p>
                    </div>
                  </div>
              </div>
              <!-- /ko -->
            </div>
      </div>
    </div>

    <br><br><br><br><br>
    <footer class="text-center text-white" style="background-color: #37a140;">
      <!-- Grid container -->
      <div class="container pt-4">
        <!-- Section: Social media -->
        <section class="mb-4">
          <!-- Facebook -->
          <a
            class="btn btn-link btn-floating btn-lg text-dark m-1"
            href="#!"
            role="button"
            data-mdb-ripple-color="dark"
            ><i class="fab fa-facebook-f"></i
          ></a>
    
          <!-- Twitter -->
          <a
            class="btn btn-link btn-floating btn-lg text-dark m-1"
            href="#!"
            role="button"
            data-mdb-ripple-color="dark"
            ><i class="fab fa-twitter"></i
          ></a>
    
          <!-- Google -->
          <a
            class="btn btn-link btn-floating btn-lg text-dark m-1"
            href="#!"
            role="button"
            data-mdb-ripple-color="dark"
            ><i class="fab fa-google"></i
          ></a>
    
          <!-- Instagram -->
          <a
            class="btn btn-link btn-floating btn-lg text-dark m-1"
            href="#!"
            role="button"
            data-mdb-ripple-color="dark"
            ><i class="fab fa-instagram"></i
          ></a>
    
          <!-- Linkedin -->
          <a
            class="btn btn-link btn-floating btn-lg text-dark m-1"
            href="#!"
            role="button"
            data-mdb-ripple-color="dark"
            ><i class="fab fa-linkedin"></i
          ></a>
          <!-- Github -->
          <a
            class="btn btn-link btn-floating btn-lg text-dark m-1"
            href="#!"
            role="button"
            data-mdb-ripple-color="dark"
            ><i class="fab fa-github"></i
          ></a>
        </section>
        <!-- Section: Social media -->
      </div>
      <!-- Grid container -->
    
      <!-- Copyright -->
      <div class="text-center text-dark p-3" style="background-color: rgba(0, 0, 0, 0.2);">
        <a class="text-dark" href="index.html">FarmLink.com</a>
      </div>
      <!-- Copyright -->
    </footer>

    <script src ="jquery-ui.js"></script>
    <script src ="all.js"></script>
    <script src="knockout-3.5.1.js"></script>
    <script src="jquery-3.6.0.min.js"></script>
    <script>
      function zerarId() {
        localStorage.setItem("SelectedProducerID", JSON.stringify("000"))
      }
      window.onload = zerarId()
    </script>
    <script src="marketPlaceController.js"></script>
    <script src="localStorageController.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
