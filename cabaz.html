<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- bootstrap css -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <!-- jquery-->
    <script src="jquery-3.6.0.min.js"></script>
    <!--font awesome n sei se está atualizado-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <!--knockout-->
    <script src="knockout-3.5.1.js"></script>
    <!--Javascript-->
    <script src="cabaz.js"></script>
    <!-- leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" integrity="sha512-xodZBNTC5n17Xt2atTPuE1HxjVMSvLVW9ocqUKLsCC5CXdbqCmblAshOMAS6/keqq/sMZMZ19scR4PsZChSR7A==" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js" integrity="sha512-XQoYMqMTK8LvdxXYG3nZ448hOEQiglfqkJs1NOQV44cWnUrBc8PkAOcXy20w0vlaXaVUearIOBhiXZ5V3ynxwA==" crossorigin=""></script>
</head>
<body>
    <table class="table table-success table-striped">
        <thead>
          <tr style="text-align: center;">
            <th scope="col">Nº do cabaz</th>
            <th scope="col">Nº de Produtos</th>
            <th scope="col">Pagamento Utilizado</th>
          </tr>
        </thead>
        <tbody data-bind="foreach:cabaz()">
          <tr style="text-align: center;">
            <th scope="row" data-bind="text:$parent.cabaz().indexOf($data) + 1"></th>
            <td><a data-bind=
              "text:$data.produtos.length,
               attr:{'data-bs-content': $data.produtos}
               " data-bs-toggle="popover" style="cursor: pointer;"></a></td>
            <td data-bind="text:$data.pagamento"></td>
          </tr>
        </tbody>
      </table>
    <!-- bootstrap and js bundle-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    
</body>
</html>
