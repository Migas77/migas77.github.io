<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- bootstrap css -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <!-- jquery-->
    <script src="jquery-3.6.0.min.js"></script>
    <!--font awesome n sei se está atualizado-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <!--knockout-->
    <script src="knockout-3.5.1.js"></script>
</head>
<body>
    <form>
        <div class="form-group ms-2 mt-2">
          <label for="future_email">Email address</label>
          <input type="email" class="form-control" id="future_email" aria-describedby="emailHelp" placeholder="Enter email">
          <small id="emailHelp8" class="form-text text-muted">Preenche o teu e-mail que entraremos em contacto contigo!</small>
        </div>
        <button type="button" class="btn btn-primary mt-3 ms-2" > Tenta a tua sorte! </button>
    </form>
    <!-- bootstrap and js bundle-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <!--Javascript-->
</body>
<script>
    $(document).ready(function(){
        $("button").click(function(){
            retval=true
            if($("#future_email").val()=="" || $("#future_email").val().includes("@")==false || $("#future_email").val().includes(".")==false){
                alert("Preencheste mal o formulário!")
                retval=false
            }
            if(retval==true){
                alert("Obrigado :)")
                window.location.href = "index.html"
            }
        })
        $("form").submit(function(){
            retval=true
            if($("#future_email").val()=="" || $("#future_email").val().includes("@")==false || $("#future_email").val().includes(".")==false){
                alert("Preencheste mal o formulário!")
                retval=false
            }
            if(retval==true){
                alert("Obrigado :)")
                window.location.href = "index.html"
            }
            return false
        })
    })
</script>
</html>
