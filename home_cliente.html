<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- bootstrap css -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <!--styles css-->
    <link rel="stylesheet" href="style2.css">
    <!-- jquery-->
    <script src="jquery-3.6.0.min.js"></script>
    <!--font awesome n sei se está atualizado-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <!--knockout-->
    <script src="knockout-3.5.1.js"></script>
    <!--Javascript-->
    <script src="home_cliente.js"></script>
    <!-- leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" integrity="sha512-xodZBNTC5n17Xt2atTPuE1HxjVMSvLVW9ocqUKLsCC5CXdbqCmblAshOMAS6/keqq/sMZMZ19scR4PsZChSR7A==" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js" integrity="sha512-XQoYMqMTK8LvdxXYG3nZ448hOEQiglfqkJs1NOQV44cWnUrBc8PkAOcXy20w0vlaXaVUearIOBhiXZ5V3ynxwA==" crossorigin=""></script>
</head>
<body>

    <div style="text-align:center;">
        <div class="user"></div>
        <h1 style="margin: auto; color: white;" id="userX"></h1>
        
        <div class="container-fluid">
            <div class="row">
                <h4 class="col-lg-4 col-md-8 col-sm-12">Escolha o Marketplace na sua região!</h4>
            </div>
            <div class="row">
                <div id="map" class="col-lg-4 col-md-8 col-sm-12"></div>
                <div class="col-lg-4 col-md-8 col-sm-12">
                    <div class="opcao">
                        <div style="padding-bottom: 10px;">
                            <a href="cabaz.html"><img src="cabaz.png" style="height: 125px;"></a>
                        </div>
                        <span class="letras" tabindex="0" id="cabaz">Meus Cabazes</span>
                    </div>
                    <div class="opcao">
                        <div style="padding-bottom: 10px;">
                            <a href="pagamento.html"><img src="pagamentos.png" style="height: 125px;"></a>
                        </div>
                        <span class="letras" tabindex="0" id="pagamento">Formas de Pagamento</span>
                    </div>
                </div>
                <div class="col-lg-4 col-md-8 col-sm-12">
                    <div  class="opcao">
                        <div style="padding-bottom: 10px;">
                            <a href="dados.html"><img src="user_info2.png" height="125px"/></a>
                        </div>
                        <span class="letras" tabindex="0" id="dados">Meus Dados</span>
                    </div>
                    <div class="opcao">
                        <div style="padding-bottom: 10px;">
                            <a href="index.html" ><img src="logout.png" style="height: 125px;"></a>
                        </div>
                        <span class="letras" tabindex="0" id="logout">Logout</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasRight" aria-labelledby="offcanvasRightLabel">
        <div class="offcanvas-header">
          <h5 id="offcanvasRightLabel">Métodos de Pagamento</h5>
          <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <form>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="inlineRadioOptions" id="MbWay" value="MbWay">
                    <label class="form-check-label" for="MbWay"><img src="MBWAY.jpg" height="140px" style="padding: 10px;margin: 10px 0px;border-radius: 10px;"></label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="inlineRadioOptions" id="PayPal" value="PayPal">
                    <label class="form-check-label" for="PayPal"><img src="paypal.png" height="150px" style="padding: 10px;margin: 10px 0px;border-radius: 10px;"></label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="inlineRadioOptions" id="Multibanco" value="Multibanco">
                    <label class="form-check-label" for="Multibanco"><img src="multibancoooo.png" height="115px" style="padding: 10px;margin: 10px 0px;border-radius: 10px;"></label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="inlineRadioOptions" id="Dinheiro" value="Dinheiro">
                    <label class="form-check-label" for="Dinheiro"><img src="pictures/cash.png" height="115px" style="padding: 10px;margin: 10px 0px;border-radius: 10px;"></label>
                </div>
            </form>
        </div>
    </div>
    <!-- bootstrap and js bundle-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    
</body>
</html>
